<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wat is er nieuw — Continuity Bridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,700&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0C0618;
      --surface:  #130825;
      --surface2: #1A0E35;
      --border:   #2C1A58;
      --border2:  #3D2278;
      --text:     #EDE8FF;
      --muted:    #8070B8;
      --dim:      #4A3280;
      --accent:   #9B40FF;
      --accent2:  #C084FC;
      --violet:   #7B28DF;
      --success:  #4ED98A;
      --warning:  #F59E0B;
      --display:  'Fraunces', serif;
      --body:     'Figtree', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      font-weight: 400;
      overflow-x: hidden;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 70% -10%, rgba(155,64,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at -10% 60%, rgba(123,40,223,0.09) 0%, transparent 55%),
        radial-gradient(ellipse 50% 30% at 50% 100%, rgba(78,217,138,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Nav ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(6,10,20,0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 0 52px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 11px;
      text-decoration: none;
    }

    .nav-logo img { width: 32px; height: 32px; border-radius: 7px; }

    .nav-logo-text {
      font-family: var(--body);
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }

    .btn-nav {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--accent);
      color: #fff;
      font-family: var(--body);
      font-weight: 600;
      font-size: 13px;
      padding: 8px 18px;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-nav:hover { background: var(--accent2); }

    .nav-right { display: flex; align-items: center; gap: 16px; }

    /* ── Language dropdown ── */
    .lang-dropdown { position: relative; }

    .lang-trigger {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--body);
      font-size: 18px;
      padding: 5px 9px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: border-color 0.15s;
      line-height: 1;
    }

    .lang-trigger:hover { border-color: var(--border2); }

    .lang-trigger-arrow { font-size: 9px; color: var(--dim); margin-top: 1px; }

    .lang-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 6px;
      min-width: 130px;
      z-index: 200;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .lang-dropdown.open .lang-menu { display: block; }

    .lang-option {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      background: none;
      border: none;
      border-radius: 6px;
      color: var(--muted);
      font-family: var(--body);
      font-size: 13px;
      font-weight: 500;
      padding: 8px 10px;
      cursor: pointer;
      text-align: left;
      transition: all 0.1s;
    }

    .lang-option:hover { background: var(--surface2); color: var(--text); }
    .lang-option.active { color: var(--text); font-weight: 600; }
    .lang-option .flag { font-size: 18px; line-height: 1; }

    /* ── Page ── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 80px 24px 120px;
    }

    .page-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 900;
      font-size: clamp(32px, 4vw, 48px);
      line-height: 1.06;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 64px;
    }

    /* ── Timeline ── */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .release {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 0 32px;
      position: relative;
    }

    .release + .release {
      margin-top: 48px;
    }

    /* Vertical line */
    .release-meta {
      padding-top: 4px;
      text-align: right;
      position: relative;
    }

    .release-meta::after {
      content: '';
      position: absolute;
      right: -20px;
      top: 10px;
      bottom: -58px;
      width: 1px;
      background: var(--border);
    }

    .release:last-child .release-meta::after { display: none; }

    .release-dot {
      position: absolute;
      right: -24px;
      top: 6px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--border2);
      border: 1px solid var(--dim);
    }

    .release.latest .release-dot {
      background: var(--success);
      border-color: var(--success);
      box-shadow: 0 0 8px rgba(78,217,138,0.5);
    }

    .release-version {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .release-date {
      font-size: 12px;
      color: var(--dim);
      margin-top: 3px;
    }

    .release-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 4px;
      margin-top: 6px;
    }

    .badge-latest {
      background: rgba(78,217,138,0.15);
      color: var(--success);
    }

    .badge-beta {
      background: rgba(155,64,255,0.15);
      color: var(--accent2);
    }

    /* ── Release body ── */
    .release-body {
      padding-bottom: 8px;
    }

    .release-title {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
      color: var(--text);
    }

    .change-group {
      margin-bottom: 16px;
    }

    .change-group-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .label-fix      { color: #FF8080; }
    .label-new      { color: var(--success); }
    .label-improve  { color: var(--accent2); }

    .change-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .change-list li {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .change-list li::before {
      content: '–';
      color: var(--dim);
      flex-shrink: 0;
      margin-top: 0px;
    }

    .change-list li strong {
      color: var(--text);
      font-weight: 500;
    }

    .release-note {
      font-size: 13px;
      color: var(--dim);
      font-style: italic;
      margin-top: 4px;
    }

    @media (max-width: 600px) {
      nav { padding: 0 20px; }
      .page { padding: 48px 16px 80px; }
      .release { grid-template-columns: 1fr; }
      .release-meta { text-align: left; padding-bottom: 12px; }
      .release-meta::after { display: none; }
      .release-dot { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="/cbapp/">
      <img src="/cbapp/logo.png" alt="Continuity Bridge" />
      <span class="nav-logo-text">Continuity Bridge</span>
    </a>
    <div class="nav-right">
      <div class="lang-dropdown" id="langDropdown">
        <button class="lang-trigger" id="langTrigger" onclick="toggleLangMenu()">
          <span id="langFlag">🇳🇱</span>
          <span class="lang-trigger-arrow">▾</span>
        </button>
        <div class="lang-menu" id="langMenu">
          <button class="lang-option active" data-lang="nl" onclick="selectLang('nl')"><span class="flag">🇳🇱</span> Nederlands</button>
          <button class="lang-option" data-lang="en" onclick="selectLang('en')"><span class="flag">🇬🇧</span> English</button>
          <button class="lang-option" data-lang="de" onclick="selectLang('de')"><span class="flag">🇩🇪</span> Deutsch</button>
        </div>
      </div>
      <a class="btn-nav" href="/cbapp/download.html" data-i18n="nav_download">Download</a>
    </div>
  </nav>

  <div class="page">
    <div class="page-tag" data-i18n="cl_page_tag">Versiegeschiedenis</div>
    <h1 data-i18n="cl_title">Wat is er nieuw?</h1>
    <p class="subtitle" data-i18n="cl_subtitle">Alle updates van Continuity Bridge, van nieuw naar oud.</p>

    <div class="timeline" id="timeline"></div>
  </div>

  <script src="translations.js"></script>
  <script src="changelog-data.js"></script>
  <script>
  // ── Changelog render ─────────────────────────────────────────────────────────
  const CL_LABEL_CLASS = { new: 'label-new', improve: 'label-improve', fix: 'label-fix' };
  const CL_LABEL_KEY   = { new: 'cl_new',     improve: 'cl_improve',    fix: 'cl_fix' };

  function t(key, lang) {
    const dict = (typeof TRANSLATIONS !== 'undefined' && TRANSLATIONS[lang]) ? TRANSLATIONS[lang] : {};
    return dict[key] !== undefined ? dict[key] : key;
  }

  function renderChangelog(lang) {
    const tl = document.getElementById('timeline');
    if (!tl || typeof RELEASES === 'undefined') return;

    tl.innerHTML = RELEASES.map(rel => {
      const isLatest = !!rel.latest;
      const hasBadge = isLatest || rel.version !== 'v1.0';
      const badgeClass = isLatest ? 'badge-latest' : 'badge-beta';
      const badgeText  = isLatest ? t('cl_badge_latest', lang) : t('cl_badge_beta', lang);

      const meta = `
        <div class="release-meta">
          <div class="release-version">${rel.version}</div>
          <div class="release-date">${rel.date[lang] || rel.date.nl}</div>
          ${hasBadge ? `<span class="release-badge ${badgeClass}">${badgeText}</span>` : ''}
          <div class="release-dot"></div>
        </div>`;

      const groups = (rel.groups || []).map(g => `
          <div class="change-group">
            <div class="change-group-label ${CL_LABEL_CLASS[g.kind]}">${t(CL_LABEL_KEY[g.kind], lang)}</div>
            <ul class="change-list">
              ${g.items.map(it => `<li>${it[lang] || it.nl}</li>`).join('')}
            </ul>
          </div>`).join('');

      const note = rel.note ? `<p class="release-note">${rel.note[lang] || rel.note.nl}</p>` : '';

      return `
      <div class="release${isLatest ? ' latest' : ''}">
        ${meta}
        <div class="release-body">
          <div class="release-title">${rel.title[lang] || rel.title.nl}</div>
          ${groups}${note}
        </div>
      </div>`;
    }).join('');
  }

  // ── Language dropdown ────────────────────────────────────────────────────────
  const FLAGS = { nl: '🇳🇱', en: '🇬🇧', de: '🇩🇪' };

  function syncLangUI(lang) {
    document.getElementById('langFlag').textContent = FLAGS[lang] || '🇳🇱';
    document.querySelectorAll('.lang-option').forEach(o => {
      o.classList.toggle('active', o.dataset.lang === lang);
    });
  }

  function toggleLangMenu() {
    document.getElementById('langDropdown').classList.toggle('open');
  }

  function selectLang(lang) {
    applyLang(lang);          // static keys via translations.js
    renderChangelog(lang);    // dynamische timeline
    syncLangUI(lang);
    document.getElementById('langDropdown').classList.remove('open');
  }

  document.addEventListener('click', e => {
    if (!document.getElementById('langDropdown').contains(e.target))
      document.getElementById('langDropdown').classList.remove('open');
  });

  document.addEventListener('DOMContentLoaded', () => {
    const lang = getLang();
    renderChangelog(lang);
    syncLangUI(lang);
  });
  </script>

</body>
</html>
