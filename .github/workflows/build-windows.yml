name: Build Windows

on:
  workflow_dispatch:   # handmatig starten
  push:
    tags:
      - 'v*'          # automatisch bij elke versie-tag

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Dependencies installeren
        run: pip install pyinstaller pdfplumber pillow certifi

      - name: Build EXE
        run: |
          $version = (Select-String -Path ale_merger_gui.py -Pattern 'VERSION\s+=\s+"([0-9.]+)' -AllMatches).Matches[0].Groups[1].Value
          pyinstaller -y --clean continuity_bridge_win.spec
          mv "dist/ContinuityBridge.exe" "dist/ContinuityBridge-${version}.exe"
          echo "EXEFILE=dist/ContinuityBridge-${version}.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Upload naar GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -z "$TAG" ] || [[ "$TAG" != v* ]]; then
            TAG=$(grep "^VERSION" ale_merger_gui.py | grep -o '[0-9][0-9.]*' | head -1)
            TAG="v${TAG}"
          fi
          echo "Uploaden naar release: $TAG"
          gh release view "$TAG" || gh release create "$TAG" \
            --title "Continuity Bridge $TAG" \
            --notes "Release $TAG"
          gh release upload "$TAG" "${{ env.EXEFILE }}" --clobber
