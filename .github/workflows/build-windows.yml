name: Build Windows

on:
  workflow_dispatch:   # handmatig starten
  push:
    tags:
      - 'v*'          # automatisch bij elke versie-tag

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Dependencies installeren
        run: pip install pyinstaller pdfplumber pillow certifi

      - name: Build EXE
        run: |
          VERSION=$(grep "^VERSION" ale_merger_gui.py | grep -o '[0-9][0-9.]*' | head -1)
          pyinstaller -y --clean continuity_bridge_win.spec
          mv "dist/ContinuityBridge.exe" "dist/ContinuityBridge-${VERSION}.exe"
          echo "EXEFILE=dist/ContinuityBridge-${VERSION}.exe" >> $GITHUB_ENV
        shell: bash

      - name: Upload naar GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.EXEFILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
